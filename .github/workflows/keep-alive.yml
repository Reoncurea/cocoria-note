name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday 18:00 JST
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl --fail --silent --show-error "${{ secrets.SUPABASE_URL }}/rest/v1/inquiries?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "Supabase pinged at $(date)"
